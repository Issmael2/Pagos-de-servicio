<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  padding: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #00e676;
  color: black;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}

button:active {
  transform: scale(0.96);
}

.menu button {
  width: 32%;
  margin: 5px 1%;
  background: #455a64;
  color: white;
}

.card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.1);
  padding: 10px;
  margin-top: 10px;
  border-radius: 12px;
}

.avatar {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #00e676;
}

.estado-activo { color: #00e676; }
.estado-vencido { color: red; }

.volver {
  background: #607d8b;
  color: white;
}
</style>
</head>

<body>

<h2>Registrar cliente</h2>

<input id="nombre" placeholder="Nombre">
<input id="fecha" type="date">
<select id="tipo">
  <option>Mensual</option>
  <option>Semanal</option>
</select>
<input id="monto" type="number" placeholder="Monto">
<input id="foto" type="file">

<button onclick="guardar()">Guardar</button>

<div class="menu">
  <button onclick="verClientes()">Clientes</button>
  <button onclick="verIngresos()">Ingresos</button>
  <button onclick="noPagaron()">No pagaron</button>
</div>

<div id="pantalla"></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxDB9WpC0yh1A036Ogi5iLmVPFgwZ17kisMJ7KA_zTGF5zLG91Sl50thvaDRmaHQIwT/exec";

let clientes = [];

// 🔥 FUNCIÓN QUE ARREGLA LAS URL DE DRIVE
function convertirURL(url) {
  if (!url) return "";

  if (url.includes("googleusercontent.com")) return url;

  if (url.includes("drive.google.com")) {
    const idMatch = url.match(/id=([^&]+)/);
    if (idMatch) {
      return "https://lh3.googleusercontent.com/d/" + idMatch[1];
    }
  }

  return url;
}

function cargar() {
  return fetch(URL)
    .then(res => res.json())
    .then(data => {
      clientes = data;
    });
}

function guardar() {
  const nombre = document.getElementById("nombre").value;
  const fecha = document.getElementById("fecha").value;
  const tipo = document.getElementById("tipo").value;
  const monto = document.getElementById("monto").value;
  const file = document.getElementById("foto").files[0];

  if (!nombre) return alert("Nombre requerido");

  const reader = new FileReader();

  reader.onload = function() {
    const base64 = reader.result ? reader.result.split(",")[1] : null;

    fetch(URL, {
      method: "POST",
      body: JSON.stringify({ nombre, fecha, tipo, monto, foto: base64 })
    }).then(() => {
      document.getElementById("nombre").value = "";
      document.getElementById("fecha").value = "";
      document.getElementById("tipo").selectedIndex = 0;
      document.getElementById("monto").value = "";
      document.getElementById("foto").value = "";

      cargar();
      alert("Guardado ✅");
    });
  };

  if (file) reader.readAsDataURL(file);
  else reader.onload();
}

function verClientes() {
  cargar().then(() => {
    let html = "<h3>👥 Clientes</h3>";

    clientes.forEach(c => {
      html += `
        <div class="card">
          <img class="avatar" src="${convertirURL(c.foto)}" onerror="this.src='https://via.placeholder.com/55'">
          
          <div style="flex:1;">
            <b>${c.nombre}</b><br>
            <span class="${c.estado === 'Activo' ? 'estado-activo' : 'estado-vencido'}">
              ${c.estado}
            </span><br>
            <small>Vence: ${c.vencimiento}</small>
          </div>

          <button onclick="renovar('${c.nombre}')" style="width:auto;padding:8px;">
            💰
          </button>
        </div>
      `;
    });

    html += `<button class="volver" onclick="menu()">⬅ Volver</button>`;
    document.getElementById("pantalla").innerHTML = html;
  });
}

function verIngresos() {
  cargar().then(() => {
    const hoy = new Date();
    const mes = hoy.getMonth();
    const año = hoy.getFullYear();

    let total = 0;

    clientes.forEach(c => {
      (c.historial || []).forEach(p => {
        const fecha = new Date(p[2]);
        if (fecha.getMonth() === mes && fecha.getFullYear() === año) {
          total += Number(p[5]);
        }
      });
    });

    document.getElementById("pantalla").innerHTML = `
      <h3>💰 Ingresos del mes</h3>
      <h2>$${total}</h2>
      <button class="volver" onclick="menu()">⬅ Volver</button>
    `;
  });
}

function noPagaron() {
  cargar().then(() => {
    const hoy = new Date();
    const mes = hoy.getMonth();
    const año = hoy.getFullYear();

    let html = "<h3>❌ No han pagado</h3>";
    let contador = 0;

    clientes.forEach(c => {
      const pago = (c.historial || []).some(p => {
        const fecha = new Date(p[2]);
        return fecha.getMonth() === mes && fecha.getFullYear() === año;
      });

      if (!pago) {
        contador++;

        html += `
          <div class="card">
            <img class="avatar" src="${convertirURL(c.foto)}" onerror="this.src='https://via.placeholder.com/55'">
            
            <div style="flex:1;">
              <b>${c.nombre}</b><br>
              <span class="estado-vencido">No ha pagado</span>
            </div>

            <button onclick="renovar('${c.nombre}')" style="width:auto;padding:8px;">
              💰
            </button>
          </div>
        `;
      }
    });

    if (contador === 0) {
      html += "<p>✅ Todos al corriente</p>";
    }

    html += `<button class="volver" onclick="menu()">⬅ Volver</button>`;
    document.getElementById("pantalla").innerHTML = html;
  });
}

function renovar(nombre) {
  const monto = prompt("Monto del pago:");
  if (!monto) return;

  const fecha = new Date().toISOString().split("T")[0];

  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      nombre,
      fecha,
      tipo: "Mensual",
      monto
    })
  }).then(() => {
    alert("Pago registrado 💰");
    verClientes();
  });
}

function menu() {
  document.getElementById("pantalla").innerHTML = "";
}

cargar();
</script>

</body>
</html>
