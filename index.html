<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Control</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
  color: white;
}

.header {
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 12px;
  border: none;
  outline: none;
}

/* BOTONES */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #00e676;
  color: black;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.15s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  -webkit-tap-highlight-color: transparent;
}

button:hover {
  background: #00c853;
}

button:active {
  transform: scale(0.96);
  background: #00b248;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

/* TABS */
.tabs {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.tabs button {
  flex: 1;
  background: #ffffff22;
  color: white;
}

/* CARD */
.card {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.08);
  padding: 10px;
  margin-top: 10px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
  margin-right: 10px;
}

.info {
  flex: 1;
}

.estado-activo {
  color: #00e676;
  font-weight: bold;
}

.estado-vencido {
  color: #ff5252;
  font-weight: bold;
}

.historial {
  background: rgba(0,0,0,0.3);
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.volver {
  background: #ff5252;
}
</style>

</head>

<body>

<div class="header">💪Dejavu GYM</div>

<div class="container">

<h3>Registrar cliente</h3>

<input type="text" id="nombre" placeholder="Nombre">
<input type="date" id="fecha">

<select id="membresia">
  <option>Mensual</option>
  <option>Semanal</option>
</select>

<input type="number" id="monto" placeholder="Monto">
<input type="file" id="foto">

<button id="btnGuardar" onclick="guardar()">Guardar</button>

<div class="tabs">
  <button onclick="cargar()">Clientes</button>
  <button onclick="verIngresos()">Ingresos</button>
  <button onclick="noPagaron()">No pagaron</button>
</div>

<input type="text" id="buscar" placeholder="Buscar..." oninput="filtrar()">

<div id="lista"></div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyCUR_bA0itQSwyjAtCPcPvilrVyeZ17UhrmcE3e11XZXCh0TDqUfhTS18k0UKE1OvY/exec";
let clientes = [];

// Convertir imagen
function convertirBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(',')[1]);
  });
}

// GUARDAR
async function guardar() {
  const btn = document.getElementById("btnGuardar");

  const nombre = document.getElementById("nombre").value;
  const fecha = document.getElementById("fecha").value;
  const membresia = document.getElementById("membresia").value;
  const monto = document.getElementById("monto").value;
  const file = document.getElementById("foto").files[0];

  if (!nombre || !fecha || !monto) {
    alert("Completa los campos");
    return;
  }

  btn.innerText = "Guardando...";
  btn.disabled = true;

  let base64 = "";
  if (file) base64 = await convertirBase64(file);

  const data = { nombre, fecha, membresia, monto, foto: base64 };

  fetch(URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    btn.innerText = "Guardado ✅";

    setTimeout(() => {
      btn.innerText = "Guardar";
      btn.disabled = false;
    }, 1500);

    cargar();
  });
}

// CARGAR CLIENTES
function cargar() {
  fetch(URL)
  .then(res => res.json())
  .then(data => {
    clientes = data;
    mostrar(clientes);
  });
}

// MOSTRAR
function mostrar(data) {
  let html = "";

  data.forEach(c => {
    html += `
      <div class="card" onclick="verHistorial(${c.id})">
        ${c.foto ? `<img class="avatar" src="${c.foto}">` : ""}
        <div class="info">
          <b>${c.nombre}</b><br>
          <span class="${c.estado === 'Activo' ? 'estado-activo' : 'estado-vencido'}">
            ${c.estado}
          </span><br>
          Vence: ${new Date(c.vencimiento).toLocaleDateString()}
        </div>
      </div>
    `;
  });

  lista.innerHTML = html;
}

// BUSCAR
function filtrar() {
  const texto = buscar.value.toLowerCase();
  const filtrados = clientes.filter(c => c.nombre.toLowerCase().includes(texto));
  mostrar(filtrados);
}

// HISTORIAL
function verHistorial(id) {
  const cliente = clientes.find(c => c.id == id);

  let html = `<h3>${cliente.nombre}</h3>`;

  cliente.historial.forEach(p => {
    html += `
      <div class="historial">
        Pago: ${new Date(p[2]).toLocaleDateString()}<br>
        Vence: ${new Date(p[3]).toLocaleDateString()}<br>
        ${p[4]} - $${p[5]}
      </div>
    `;
  });

  html += `<button class="volver" onclick="cargar()">Volver</button>`;

  lista.innerHTML = html;
}

// INGRESOS
function verIngresos() {
  const hoy = new Date();
  let total = 0;
  let html = "<h3>💰 Ingresos del mes</h3>";

  clientes.forEach(c => {
    c.historial.forEach(p => {
      const fecha = new Date(p[2]);
      if (fecha.getMonth() === hoy.getMonth()) {
        total += Number(p[5]);
        html += `<div class="historial">${c.nombre} - $${p[5]}</div>`;
      }
    });
  });

  lista.innerHTML = `<h2>Total: $${total}</h2>` + html;
}

// NO PAGARON
function noPagaron() {
  const hoy = new Date();
  let html = "<h3>❌ No han pagado este mes</h3>";

  clientes.forEach(c => {
    const pagoEsteMes = c.historial.some(p => {
      const fecha = new Date(p[2]);
      return fecha.getMonth() === hoy.getMonth();
    });

    if (!pagoEsteMes) {
      html += `
        <div class="card">
          ${c.foto ? `<img class="avatar" src="${c.foto}">` : ""}
          <div class="info">
            <b>${c.nombre}</b><br>
            <span class="estado-vencido">No ha pagado</span>
          </div>
        </div>
      `;
    }
  });

  html += `<button class="volver" onclick="cargar()">Volver</button>`;
  lista.innerHTML = html;
}

cargar();

</script>

</body>
</html>
